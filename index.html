<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANG-CARE (async)</title>

    <!-- jsPsych 7.3.4 core + plugins, loaded from CDN (same versions as DialectCorrection) -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css">
    <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.2.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.2"></script>

    <style>
      :root {
        --bg: #fef9e7;
        --panel: #ffffff;
        --accent: #4a90d9;
        --accent-dark: #2c6cb0;
        --good: #56ab2f;
        --bad: #eb3349;
        --text: #2b2b2b;
        --muted: #6b6b6b;
        --shadow: 0 6px 18px rgba(0,0,0,0.10);
        --radius: 18px;
      }
      html, body {
        margin: 0; padding: 0;
        font-family: "Comic Sans MS", "Chalkboard SE", "Trebuchet MS", system-ui, sans-serif;
        background: var(--bg); color: var(--text);
      }
      .jspsych-content { max-width: 960px; }
      .jspsych-btn {
        font-family: inherit; font-size: 20px; padding: 14px 22px;
        border-radius: 14px; border: none; background: var(--accent); color: #fff;
        box-shadow: 0 4px 0 var(--accent-dark); cursor: pointer; margin: 8px;
      }
      .jspsych-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--accent-dark); }

      /* ---- the "scene": two speakers flanking the adult-in-the-middle ---- */
      .lc-scene {
        display: flex; justify-content: center; align-items: flex-end;
        gap: 28px; margin: 18px auto; min-height: 320px;
      }
      .lc-actor { display: flex; flex-direction: column; align-items: center; width: 220px; }
      .lc-actor img.lc-face {
        width: 200px; height: 240px; object-fit: cover; display: block;
        border-radius: 16px; box-shadow: var(--shadow);
      }
      /* face-image response buttons (child taps the face) */
      .jspsych-btn.lc-facebtn { background: transparent; box-shadow: none; padding: 6px; }
      .jspsych-btn.lc-facebtn:active { transform: translateY(2px); box-shadow: none; }
      .lc-facebtn-img {
        width: 180px; height: 216px; object-fit: cover; border-radius: 16px;
        box-shadow: var(--shadow); border: 5px solid transparent; transition: border-color .1s;
      }
      .jspsych-btn.lc-facebtn:hover .lc-facebtn-img { border-color: var(--accent); }
      /* small inline face thumbnail used inside the affiliation story */
      .lc-inline {
        width: 56px; height: 66px; object-fit: cover; border-radius: 10px;
        vertical-align: middle; margin: 0 5px; box-shadow: var(--shadow);
      }
      .lc-adult { width: 200px; }
      .lc-adult img {
        width: 170px; height: 170px; object-fit: cover; border-radius: 50%;
        border: 6px solid #ffd166; box-shadow: var(--shadow);
      }
      .lc-label { margin-top: 8px; font-size: 18px; color: var(--muted); }

      /* talking / singing animation: a gentle shake */
      @keyframes lc-shake {
        0%,100% { transform: translateX(0) rotate(0); }
        25% { transform: translateX(-4px) rotate(-2deg); }
        75% { transform: translateX(4px) rotate(2deg); }
      }
      .lc-talking { animation: lc-shake 0.28s linear infinite; }
      /* a bigger, happier bounce for "singing together" (affiliation) */
      @keyframes lc-bounce {
        0%,100% { transform: translateY(0) rotate(0); }
        50% { transform: translateY(-10px) rotate(2deg); }
      }
      .lc-singing { animation: lc-bounce 0.5s ease-in-out infinite; }

      .lc-speech {
        min-height: 40px; font-size: 26px; margin: 6px 0 0; font-weight: bold;
        color: var(--accent-dark);
      }
      .lc-prompt { font-size: 26px; margin: 10px 0 4px; }

      /* webcam capture screen */
      #lc-cam-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
      #lc-video, #lc-canvas {
        width: 360px; height: 270px; border-radius: var(--radius);
        background: #222; object-fit: cover; box-shadow: var(--shadow);
        transform: scaleX(-1); /* mirror live preview so it feels like a mirror */
      }
      #lc-photo-choices { display: flex; flex-direction: column; gap: 10px; align-items: center; }
      #lc-preview {
        width: 360px; height: 270px; border-radius: var(--radius);
        object-fit: cover; box-shadow: var(--shadow);
      }
      label.jspsych-btn { display: inline-block; }
      .jspsych-btn.secondary { background: #8aa0b5; box-shadow: 0 4px 0 #6b8299; }
      .jspsych-btn.secondary:active { box-shadow: 0 2px 0 #6b8299; }
      .lc-hidden { display: none !important; }
    </style>
</head>
<body></body>
<script src="experiment.js?v=10"></script>
</html>
